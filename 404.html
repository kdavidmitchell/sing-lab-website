<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | SING Lab</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Inter:wght@300;400;600&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="symposium-banner" id="symposium-banner">
        <span class="banner-text"><strong>Announcing Horizons of Play:</strong> A symposium on Computing, Media, and the Human Experience. Join us June 5th.</span>
        <a href="events.html" class="banner-btn">Learn More</a>
        <button id="close-banner" class="close-banner-btn" aria-label="Dismiss banner">&times;</button>
    </div>

    <nav>
        <a href="index.html" class="nav-brand">
            <img src="media/sing-logo-test.png" alt="SING Lab Logo" class="brand-icon">
        </a>
        <button id="theme-toggle" class="theme-btn" aria-label="Toggle Dark Mode"></button>
        <button class="hamburger" aria-label="Toggle navigation">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>
        <ul class="nav-links">
            <li><a href="index.html">About</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="publications.html">Publications</a></li>
            <li><a href="people.html">People</a></li>
            <li><a href="events.html">Events</a></li>
        </ul>
    </nav>

    <header class="hero hero-compact">
        <div class="container hero-content">
            <h1 id="glitch-target">Error 404</h1>
            <p>Narrative branch uncompiled. Please resolve the plotline.</p>
        </div>
    </header>

    <section class="container">
        <div class="story-container">
            <div id="story-text">Loading narrative state...</div>
            <div id="choices-container" class="choices"></div>
        </div>
    </section>

    <script src="script.js"></script>
    <script>
        // The 404 Text Adventure Engine
        const storyStates = {
            start: {
                text: "You have wandered off the golden path. The narrative engine hasn't generated any scenery for this sector yet. It is just blank parchment and floating variables.",
                choices: [
                    { text: "[Attempt to reboot the story engine]", target: "reboot" },
                    { text: "[Walk toward the flickering 'Index' beacon in the distance]", target: "walk" }
                ]
            },
            reboot: {
                text: "You send a reboot command. The system hums, and a dialogue prompt appears: 'Destination required to resume social simulation.'",
                choices: [
                    { text: "[Input destination: Home]", target: "home" }
                ]
            },
            walk: {
                text: "You navigate through unresolved plotlines and abandoned NPC dialogue trees. Eventually, you find a stable doorway leading back to the main branch.",
                choices: [
                    { text: "[Step through the doorway]", target: "home" }
                ]
            }
        };

        const storyTextEl = document.getElementById("story-text");
        const choicesContainerEl = document.getElementById("choices-container");

        function renderState(stateKey) {
            if (stateKey === "home") {
                window.location.href = "index.html"; // Redirects to homepage
                return;
            }

            const state = storyStates[stateKey];
            storyTextEl.textContent = state.text;
            choicesContainerEl.innerHTML = ""; // Clear old choices

            state.choices.forEach(choice => {
                const btn = document.createElement("button");
                btn.className = "choice-btn";
                btn.textContent = choice.text;
                btn.onclick = () => renderState(choice.target);
                choicesContainerEl.appendChild(btn);
            });
        }

        // Initialize the game
        renderState("start");
    </script>
</body>
</html>
